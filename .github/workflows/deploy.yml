name: Build & Deploy FTP

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".eleventy.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - run: npm test

      - name: Deploy via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -u mattviel,${{ secrets.FTP_PASSWORD }} ftp.webmo.fr <<SCRIPT
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          mirror --reverse --delete --exclude images/ --verbose ./public/ /www/herbarius/
          bye
          SCRIPT
