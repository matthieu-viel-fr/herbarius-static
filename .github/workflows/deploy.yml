name: Build & Deploy FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - run: npm test

      - name: Deploy via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -u p6691,${{ secrets.FTP_PASSWORD }} ftp.webmo.fr <<SCRIPT
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          mirror --reverse --delete --verbose ./public/ /www/herbarius/
          bye
          SCRIPT
